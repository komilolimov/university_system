version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: university_db
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-university_db}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-postgres} -d $${POSTGRES_DB:-university_db}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: university_redis
    restart: always
    ports:
      - "6379:6379"

  minio:
    image: minio/minio:latest
    container_name: university_minio
    restart: always
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: adminpassword
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data

  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: university_web
    restart: always
    ports:
      - "8888:8000"
    environment:
      DATABASE_URL: postgresql+psycopg2://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-university_db}
      REDIS_URL: redis://redis:6379/0
    volumes:
      - ./certs:/app/certs
      - ./src:/app/src
      - ./tests:/app/tests
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    command: >
      sh -c "alembic upgrade head && 
             uvicorn src.main:app --host 0.0.0.0 --port 8000"

  celery_worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: university_celery_worker
    restart: always
    environment:
      DATABASE_URL: postgresql+psycopg2://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-university_db}
      REDIS_URL: redis://redis:6379/0
    volumes:
      - ./certs:/app/certs
      - ./src:/app/src
      - ./tests:/app/tests
    depends_on:
      redis:
        condition: service_started
    command: >
      celery -A src.core.celery_app.celery_app worker --loglevel=info

volumes:
  postgres_data:
  minio_data: